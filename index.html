<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Card Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <p class="eyebrow">Research Toolkit</p>
        <h1>Prompt Card Manager</h1>
        <p class="subtitle">卡片化管理研究提示词，支持拖拽排序、完整 CRUD 和本地自动保存。</p>
      </header>

      <section class="toolbar" aria-label="Manager actions">
        <button id="addCardBtn" type="button" class="btn btn-primary">新增卡片</button>
        <button id="resetBtn" type="button" class="btn btn-danger">重置所有数据</button>
      </section>

      <section id="promptGrid" class="card-grid" aria-label="Prompt cards"></section>
    </main>

    <template id="promptCardTemplate">
      <article class="prompt-card" draggable="true">
        <div class="card-head">
          <div class="title-wrap">
            <h2 class="prompt-title"></h2>
            <span class="category-tag"></span>
          </div>
          <div class="head-actions">
            <button type="button" class="text-btn toggle-btn" aria-expanded="false">展开</button>
            <button type="button" class="text-btn edit-btn">编辑</button>
            <button type="button" class="text-btn delete-btn danger">删除</button>
          </div>
        </div>

        <div class="prompt-meta">
          <span class="created-at"></span>
          <span class="drag-hint">拖拽卡片可排序</span>
        </div>

        <div class="prompt-collapse" hidden>
          <pre class="prompt-text"></pre>
        </div>

        <div class="card-input-area">
          <label class="textarea-label">输入内容</label>
          <textarea
            class="user-input"
            rows="5"
            placeholder="在这里粘贴需要组合到提示词中的内容..."
          ></textarea>
          <div class="card-actions">
            <button type="button" class="btn btn-copy copy-btn">Copy</button>
            <span class="copy-status" aria-live="polite"></span>
          </div>
        </div>
      </article>
    </template>

    <div id="cardModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="modalTitle"></h2>
          <button id="closeModalBtn" type="button" class="text-btn">关闭</button>
        </div>

        <form id="cardForm" class="modal-form">
          <label for="cardTitle">标题</label>
          <input id="cardTitle" name="title" type="text" maxlength="60" required />

          <label for="cardCategory">分类 / 标签</label>
          <input id="cardCategory" name="category" type="text" maxlength="30" required />

          <label for="cardPrompt">Prompt 内容</label>
          <textarea id="cardPrompt" name="promptText" rows="9" required></textarea>

          <div class="modal-actions">
            <button id="cancelModalBtn" type="button" class="btn">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
